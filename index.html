<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ST NEWS TV LKO | ताज़ा खबरें</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Hind', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        /* न्यूज़ टिकर स्टाइल */
        .ticker-container {
            width: 100%;
            background: #ff0000;
            color: #fff;
            padding: 10px 0;
            overflow: hidden;
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .ticker-text {
            display: inline-block;
            white-space: nowrap;
            animation: scroll-left 15s linear infinite;
            font-weight: bold;
            font-size: 18px;
        }

        @keyframes scroll-left {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* मेन कंटेंट */
        .content {
            margin-top: 80px;
            padding: 20px;
            text-align: center;
        }

        /* 3D सोशल बटन्स */
        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
        }

        .btn-3d {
            padding: 15px 25px;
            font-size: 18px;
            text-decoration: none;
            color: white;
            border-radius: 10px;
            display: inline-block;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 9px #999;
            font-weight: bold;
        }

        .btn-3d:active {
            box-shadow: 0 5px #666;
            transform: translateY(4px);
        }

        .youtube { background-color: #FF0000; }
        .whatsapp { background-color: #25D366; }
        .instagram { background-color: #E1306C; }

    </style>
</head>
<body>

    <div class="ticker-container">
        <div class="ticker-text">
            ब्रेकिंग न्यूज़: ST NEWS TV LKO पर आपका स्वागत है... लखनऊ की ताज़ा खबरों के लिए हमसे जुड़े रहें... सच्ची खबरें, बिना किसी मिलावट के...
        </div>
    </div>

    <div class="content">
        <h1>ST NEWS TV LKO</h1>
        <p>असहाय लोगों की मदद और सच्ची पत्रकारिता का संकल्प।</p>

        <div class="social-buttons">
            <a href="#" class="btn-3d youtube">YouTube</a>
            <a href="#" class="btn-3d whatsapp">WhatsApp</a>
            <a href="#" class="btn-3d instagram">Instagram</a>
        </div>
    </div>

</body>
</html>
